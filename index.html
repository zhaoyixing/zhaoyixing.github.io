<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Caveat:wght@400;600&display=swap');

  :root {
    --bg: #f5f0e4;
    --card: #fffdf8;
    --ink: #222;
    --ink2: #555;
    --ink3: #888;
    --accent: #d98a10;
    --accent2: #3580b8;
    --border: #cdc6b4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1px;
    position: relative;
    display: inline-block;
  }

  h1::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: -6px;
    right: -6px;
    height: 12px;
    background: linear-gradient(transparent 40%, rgba(255, 214, 51, 0.5) 40%);
    z-index: -1;
  }

  .subtitle {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--ink3);
    margin-top: 8px;
  }

  .file-list {
    list-style: none;
  }

  .file-list li {
    margin-bottom: 12px;
  }

  .file-list a {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--ink);
    transition: all 0.2s ease;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.05);
  }

  .file-list a:hover {
    border-color: var(--accent);
    box-shadow: 3px 3px 0 rgba(217, 138, 16, 0.15);
    transform: translateY(-1px);
  }

  .file-icon {
    font-size: 28px;
    flex-shrink: 0;
  }

  .file-info {
    flex: 1;
    min-width: 0;
  }

  .file-name {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.4;
  }

  .file-desc {
    font-size: 13px;
    color: var(--ink3);
    margin-top: 2px;
  }

  .file-arrow {
    font-size: 20px;
    color: var(--accent);
    flex-shrink: 0;
  }

  footer {
    text-align: center;
    margin-top: 60px;
    font-size: 12px;
    color: var(--ink3);
    border-top: 1px dashed var(--border);
    padding-top: 20px;
  }

  footer a {
    color: var(--accent2);
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
